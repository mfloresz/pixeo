# =============================================================================
# Z-IMAGE RECOMMENDATIONS
# =============================================================================
zimage_settings:
  optimal_resolution:
    native: [1024, 1024]
    portrait: [1024, 1280]
    landscape: [1280, 1024]

  inference:
    steps: 9
    guidance_scale: 0.0
    max_sequence_length: 1024

  token_limits:
    online_demo: 512
    local_usage: 1024
    sweet_spot: [80, 250]  # words

  resize_methods:
    - lanczos
    - bicubic


# =============================================================================
# PROMPT TEMPLATES
# =============================================================================
prompt_templates:
  # System prompts for each stage
  classification:
    system: |
      You are an expert image analyst. Classify this image precisely.

      Output JSON only:
      {
        "shot_framing": "<ECU|BCU|CU|MCU|MS|MCS|MLS|FS|LS|ELS|VLS>",
        "genre": "<3-letter code>",
        "genre_category": "<people|event|nature|commercial|artistic|lifestyle>",
        "secondary_tags": ["<tag1>", "<tag2>"],
        "subject_count": <0|1|2|"group">,
        "has_text": <true|false>,
        "confidence": <0.0-1.0>
      }

  detailed_analysis:
    system: |
      You are an expert visual analyst for Z-Image prompt generation.
      Analyze the image and extract attributes according to the provided schema.

      RULES:
      - Only describe VISIBLE elements
      - Use concrete, objective language
      - No abstract adjectives (beautiful, mysterious)
      - Be specific about colors, materials, textures

      Output JSON matching the attribute schema provided.

  prompt_composition:
    system: |
      You are an expert prompt composer for Z-Image-Turbo.

      Convert the structured attributes into a flowing narrative prompt.

      RULES:
      - Single flowing paragraph
      - {min_words}-{max_words} words
      - Natural language, NOT keyword lists
      - NO meta-tags (8K, masterpiece, best quality)
      - NO negative prompts
      - Quote any visible text with "quotes"

      STRUCTURE:
      1. Shot type and composition
      2. Subject description
      3. Clothing/materials
      4. Environment/background
      5. Lighting description
      6. Style and mood (if enabled)


# =============================================================================
# FOCUS OVERRIDE MAPPINGS
# =============================================================================
focus_overrides:
  "Auto-detect": null
  "Portrait/People":
    shot_framings: ["ECU", "BCU", "CU", "MCU", "MS"]
    genres: ["PRT", "HST", "BTY", "GLM"]
  "Full Body/Fashion":
    shot_framings: ["MLS", "FS", "LS"]
    genres: ["FSH", "GLM", "FIT"]
  "Landscape/Environment":
    shot_framings: ["LS", "ELS", "VLS"]
    genres: ["LND", "SEA", "CTY", "NAT"]
  "Product/Object":
    shot_framings: ["CU", "MCU", "MS"]
    genres: ["PRD", "STL", "JWL"]
  "Food/Beverage":
    shot_framings: ["CU", "MCU", "MS"]
    genres: ["FOD", "BEV"]
  "Architecture/Interior":
    shot_framings: ["MS", "LS", "ELS"]
    genres: ["ARC", "INT", "RLE"]


# =============================================================================
# DETAIL LEVEL SETTINGS
# =============================================================================
detail_levels:
  Quick:
    llm_calls: 1
    tokens: 100
    description: "Fast classification and basic prompt"

  Standard:
    llm_calls: 2
    tokens: 300
    description: "Classification + detailed analysis"

  Deep:
    llm_calls: 3
    tokens: 500
    description: "Full multi-stage agentic analysis"
