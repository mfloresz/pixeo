# Z-Image Prompt Generator Configuration
# All metadata for shot framings, photography genres, and attribute schemas

version: "1.0.0"

# =============================================================================
# SHOT FRAMINGS (Distance to Subject)
# =============================================================================
shot_framings:
  ECU:
    name: "Extreme Close-Up"
    description: "Single feature (eye, lips, detail)"
    use_case: "Emotion, texture, detail"
    attributes: ["face_detail", "skin", "eyes", "lips"]

  BCU:
    name: "Big Close-Up"
    description: "Face only (forehead to chin)"
    use_case: "Intense emotion, beauty"
    attributes: ["face", "eyes", "skin", "lips", "expression", "hair_partial"]

  CU:
    name: "Close-Up"
    description: "Head and neck"
    use_case: "Expression, portrait"
    attributes: ["face", "eyes", "skin", "lips", "expression", "hair", "neck"]

  MCU:
    name: "Medium Close-Up"
    description: "Head and shoulders"
    use_case: "Conversation, headshot"
    attributes: ["face", "eyes", "skin", "lips", "expression", "hair", "clothing_upper_partial", "accessories"]

  MS:
    name: "Medium Shot"
    description: "Waist up"
    use_case: "Upper body, gestures"
    attributes: ["face", "expression", "hair", "body_upper", "clothing_upper", "pose_upper", "accessories"]

  MCS:
    name: "Medium Cowboy Shot"
    description: "Mid-thigh up"
    use_case: "Western style, holster visible"
    attributes: ["face", "expression", "hair", "body_upper", "clothing_upper", "clothing_lower_partial", "pose_upper"]

  MLS:
    name: "Medium Long Shot"
    description: "Knees up (3/4 shot)"
    use_case: "Body language, outfit"
    attributes: ["face", "body", "clothing_full", "pose_full", "accessories"]

  FS:
    name: "Full Shot"
    description: "Head to toe"
    use_case: "Complete figure, fashion"
    attributes: ["face", "body", "body_exposure", "clothing_full", "pose_full", "footwear", "accessories"]

  LS:
    name: "Long Shot"
    description: "Full body + surroundings"
    use_case: "Context, environment"
    attributes: ["body", "clothing_full", "pose_full", "environment", "lighting"]

  ELS:
    name: "Extreme Long Shot"
    description: "Wide vista, tiny subject"
    use_case: "Landscape, establishing"
    attributes: ["environment", "atmosphere", "lighting", "subject_placement"]

  VLS:
    name: "Very Long Shot"
    description: "Subject small in frame"
    use_case: "Scale, isolation"
    attributes: ["environment", "atmosphere", "lighting", "subject_silhouette"]


