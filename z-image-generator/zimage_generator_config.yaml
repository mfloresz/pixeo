    hips:
      options: ["covered", "hip bones visible", "side hip exposed"]
    thigh:
      options: ["covered", "partially visible", "fully visible", "inner thigh visible"]
    thigh_coverage:
      options: ["full", "knee", "mid-thigh", "high-thigh", "minimal"]
    buttocks:
      options: ["fully covered", "outlined", "partially visible", "cheeks visible"]

  # --- Clothing Upper ---
  clothing_upper:
    type:
      options: ["shirt", "blouse", "t-shirt", "sweater", "jacket", "coat", "dress", "tank top", "crop top", "bralette", "bikini top", "lingerie", "corset", "bodysuit", "swimwear"]
    neckline:
      style:
        options: ["crew", "v-neck", "deep-v", "plunging", "scoop", "sweetheart", "off-shoulder", "halter", "strapless", "turtleneck", "collared", "keyhole", "cowl"]
      depth:
        options: ["high", "moderate", "low", "very low"]
    sleeves:
