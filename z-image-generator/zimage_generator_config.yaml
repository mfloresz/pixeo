# =============================================================================
# ATTRIBUTE SCHEMAS BY CONTENT DETAIL LEVEL
# =============================================================================
content_detail_levels:
  minimal:
    description: "Basic description only"
    body: ["build"]
    clothing: ["type", "color"]

  standard:
    description: "Normal detail level"
    body: ["build", "posture"]
    clothing: ["type", "fit", "color", "material"]

  detailed:
    description: "Body proportions, clothing cuts"
    body: ["build", "posture", "proportions", "exposure_areas"]
    clothing: ["type", "fit", "color", "material", "neckline", "coverage", "cutouts"]

  explicit:
    description: "Full NSFW detail for Z-Image"
    body: ["build", "posture", "proportions", "exposure_full", "sensuality"]
    clothing: ["type", "fit", "color", "material", "neckline", "coverage", "cutouts", "underwear", "swimwear_detail"]


# =============================================================================
# ATTRIBUTE DEFINITIONS
# =============================================================================
attributes:
  # --- Subject ---
  subject:
    gender:
      options: ["male", "female", "non-binary"]
    age_range:
      options: ["child", "teen", "young adult", "adult", "middle-aged", "elderly"]
    ethnicity:
      note: "Describe skin tone only"

  # --- Face ---
  face:
    shape:
      options: ["oval", "round", "heart", "square", "oblong", "diamond"]
    angle:
      options: ["frontal", "3/4 left", "3/4 right", "profile left", "profile right"]
    tilt:
      options: ["level", "tilted left", "tilted right", "chin up", "chin down"]

  # --- Eyes ---
  eyes:
    color:
      examples: ["hazel", "deep brown", "steel blue", "amber", "green", "gray"]
    shape:
      options: ["almond", "round", "hooded", "upturned", "downturned", "monolid"]
    state:
      options: ["open", "half-lidded", "closed", "squinting"]
    gaze:
      options: ["direct at camera", "looking left", "looking right", "looking up", "looking down", "distant"]
    expression:
      options: ["soft", "intense", "playful", "serious", "tired"]
    makeup:
      options: ["none", "natural", "bold", "smokey", "colorful"]
    lashes:
      options: ["natural", "mascara", "false lashes"]
    brows:
      options: ["natural", "groomed", "bold", "thin"]

  # --- Skin ---
  skin:
    tone:
      options: ["porcelain", "ivory", "fair", "light", "medium", "olive", "tan", "brown", "deep brown", "dark"]
    undertone:
      options: ["warm", "cool", "neutral"]
    texture:
      options: ["smooth", "freckled", "textured", "weathered"]
    condition:
      options: ["natural", "dewy", "matte", "glowing", "oily"]
    features:
      options: ["beauty marks", "scars", "dimples", "wrinkles"]

  # --- Lips ---
  lips:
    shape:
      options: ["full", "thin", "heart", "wide", "cupid's bow"]
    color:
      options: ["natural pink", "nude", "red", "berry", "coral"]
    state:
      options: ["closed", "slightly parted", "smiling", "pursed"]

  # --- Expression ---
  expression:
    overall:
      options: ["happy", "sad", "serious", "thoughtful", "surprised", "neutral", "sensual", "confident"]
    intensity:
      options: ["subtle", "moderate", "dramatic"]
    authenticity:
      options: ["genuine", "posed"]

  # --- Hair ---
  hair:
    color:
      options: ["black", "dark brown", "chestnut", "auburn", "red", "blonde", "platinum", "gray", "white"]
    highlights:
      options: ["none", "subtle", "balayage", "streaks"]
    length:
      options: ["bald", "buzz", "short", "medium", "shoulder-length", "long", "very long"]
    texture:
      options: ["straight", "wavy", "curly", "coily", "kinky"]
    style:
      options: ["loose", "ponytail", "bun", "braids", "updo", "messy", "slicked"]
    state:
      options: ["clean", "wet", "windswept", "disheveled"]
    parting:
      options: ["center", "side left", "side right", "none"]
    bangs:
      options: ["none", "full", "side-swept", "curtain"]

  # --- Facial Hair ---
  facial_hair:
    type:
      options: ["none", "stubble", "beard", "mustache", "goatee"]
    length:
      options: ["short", "medium", "long"]
    grooming:
      options: ["neat", "rugged", "styled"]

  # --- Body Upper ---
  body_upper:
    shoulders:
      options: ["narrow", "average", "broad", "sloped"]
    bust:
      size:
        options: ["small", "medium", "large", "very large"]
      shape:
        options: ["natural", "rounded", "perky"]
      cleavage:
        options: ["none", "subtle", "moderate", "prominent", "deep"]
    torso:
      type:
        options: ["slim", "toned", "athletic", "soft", "muscular"]
      waist:
        options: ["narrow", "defined", "average", "wide"]
      midriff:
        options: ["covered", "partially visible", "fully exposed"]
    back:
      exposure:
        options: ["none", "upper back", "full back", "backless"]

  # --- Body Full ---
  body:
    build:
      options: ["slim", "petite", "athletic", "toned", "average", "curvy", "hourglass", "plus-size", "muscular"]
    height:
      options: ["appears short", "average", "tall"]
    posture:
      options: ["upright", "relaxed", "slouched", "dynamic", "arched"]
    proportions:
      bust:
        options: ["small", "medium", "large", "very large"]
      waist:
        options: ["narrow", "defined", "average"]
      hips:
        options: ["narrow", "average", "wide", "curvy"]
      legs:
        options: ["slim", "toned", "athletic", "curvy", "long"]

  # --- Body Exposure (NSFW detail) ---
  body_exposure:
    chest:
      options: ["fully covered", "cleavage visible", "sideboob", "underboob"]
    stomach:
      options: ["covered", "midriff visible", "navel visible", "fully exposed"]
    back:
