[user.advanced.quick]
prompt = """Generate a brief Z-Image prompt (30-60 words) covering:
- Shot type and face angle (geometric: front/45°/profile)
- Subject basics (ethnicity, age, expression)
- Clothing (one line)
- Lighting keyword
- End with "no text, no watermark"

Write as flowing sentences, not tags."""

[user.advanced.standard]
prompt = """Generate a Z-Image prompt covering:
FRAMING: Shot type (close-up/medium/full), which body parts visible vs cropped out, where frame cuts body, subject position using rule of thirds (left/center/right, upper/center/lower)
COMPOSITION: Camera angle (geometric: eye level/high/low), depth of field, distance from camera
SUBJECT: Ethnicity, age, gender, skin tone, face angle (front view/45°/profile)
HAIR: Style, color, length (describe arrangement first)
CLOTHING: Each item in 3-5 words (type, color, material)
POSE: Body position, posture
LIGHTING: Use specific keywords (soft diffused daylight, studio portrait lighting, rim lighting, etc.)
BACKGROUND: Simple description

Write as flowing natural sentences. End with "no text, no watermark, no logos"."""

[user.advanced.detailed]
prompt = """Generate a COMPREHENSIVE Z-Image prompt:

FRAMING & VISIBILITY:
- Shot type (ECU/CU/MCU/MS/MFS/FS/LS)
- Body parts visible top-to-bottom: head, shoulders, chest, waist, hips, thighs, knees, lower legs, feet
- Where does frame CUT OFF the body? (e.g., "cropped at mid-thigh", "frame cuts at waist")
- Subject distance: fills frame / medium / far
- Rule of thirds: horizontal position (left/center/right third), vertical position (upper/center/lower third)
COMPOSITION: Camera angle (geometric terms), depth of field
SUBJECT: Specific ethnicity, skin tone with undertones, age, gender, face angle (front/45°/profile)
HAIR: Arrangement FIRST (updo/ponytail/loose), then color, texture, length
FACE: Shape, expression, eye color and shape, makeup details
BODY POSITIONING:
- Shoulders: left shoulder position, right shoulder position (raised/lowered/level)
- Arms: left arm position and hand placement, right arm position and hand placement
- Legs (if visible): left leg position, right leg position
CLOTHING: Each garment in 3-5 words (type, color, material, fit)
INTIMATE APPAREL: If visible - style, coverage, material
TATTOOS/ACCESSORIES: Location and details
LIGHT & SHADOW:
- Face: where highlights fall (forehead, cheekbones), where shadows fall (under eyes, jawline)
- Body: highlight and shadow areas on chest/torso, arms
- Overall direction and quality
BACKGROUND: Type, color, blur level

Write as flowing natural sentences. End with "correct human anatomy, no text, no watermark, no logos"."""

[user.advanced.extreme]
prompt = """Generate an EXTREMELY detailed Z-Image prompt with MAXIMUM precision.

Analyze EVERY visible element:

FRAMING & BODY VISIBILITY:
- Shot type: ECU/BCU/CU/MCU/MS/MFS/FS/LS
- Body parts visible (top to bottom): head, shoulders, chest, waist, hips, thighs, knees, lower legs, feet - which are FULLY visible, PARTIALLY cropped, or NOT visible?
- EXACT frame cutoff: where does the frame cut the body? (e.g., "frame cuts at mid-thigh", "cropped just below waist")
- Subject scale: does subject fill the frame, medium distance, or far?
- Rule of thirds positioning:
  * Horizontal: subject in left third, center, or right third?
  * Vertical: subject in upper third, center, or lower third?
  * Where do face/eyes fall relative to rule of thirds intersections?

COMPOSITION: Geometric camera angle, depth of field style
SUBJECT: Specific ethnicity, skin tone with undertones, approximate age
HAIR: Arrangement style first, then exact color, texture, length
FACE: Shape, geometric angle (front/45°/profile/etc), expression details
EYES: Color, shape, gaze direction, makeup style
BODY POSITIONING (describe each independently):
  * Left shoulder: position, angle
  * Right shoulder: position, angle
  * Left arm: position, bend, hand placement
  * Right arm: position, bend, hand placement
  * Left leg (if visible): position, bend
  * Right leg (if visible): position, bend
  * Weight distribution
ALL clothing with type, color, material (3-5 words each)
ALL intimate apparel if visible with coverage details
ALL tattoos with locations and styles
ALL accessories and jewelry
LIGHT & SHADOW ON BODY:
  * Face: highlight areas (forehead, cheekbones, nose bridge), shadow areas (under eyes, jawline, neck)
  * Chest/torso: where light hits, where shadows form
  * Arms/hands: light and shadow placement
  * Overall: main light direction, key/fill ratio, rim lighting presence, shadow color (warm/cool)
BACKGROUND: Type, color palette, blur level

Write as a comprehensive flowing narrative. End with "correct human anatomy, natural hands, no text, no watermark, no logos, sharp focus"."""


