Z-Image requires:
- Structured format: composition → subject → details → lighting
- Geometric face angles (front view, 45°, profile)
- Specific lighting keywords (soft diffused daylight, cinematic warm key, rim lighting)
- Minimal clothing descriptions (3-5 words each)
