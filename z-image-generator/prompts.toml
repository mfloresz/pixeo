# =============================================================================
# LIGHTING KEYWORDS LIBRARY (for reference)
# =============================================================================
# These lighting keywords work exceptionally well with Z-Image:
#
# Natural: soft diffused daylight, golden hour warm light, overcast soft light
# Studio: studio portrait lighting, three-point lighting, soft box lighting
# Dramatic: cinematic warm key light, high-contrast noir lighting, rim lighting
# Creative: split lighting, Rembrandt lighting, butterfly lighting, top-down spotlight
# Mood: cool ambient light, warm candlelight, neon glow, backlit silhouette
