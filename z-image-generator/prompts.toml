# =============================================================================
# Prompt Templates for SID Photography Toolkit
# =============================================================================
# Prompts are organized by tier (advanced/standard/basic) and mode (quick/standard/detailed/extreme)
# Triple-quoted strings (""") allow multi-line prompts
#
# Z-IMAGE TURBO BEST PRACTICES:
# - No negative prompts (guidance_scale=0) - all constraints go in positive prompt
# - Structured format: Composition > Subject > Clothing > Environment > Lighting > Technical
# - Use geometric face angles (front view, 45°, profile) not poetic descriptions
# - Lighting keywords work exceptionally well
# - Place cleanup constraints at the end (no text, no watermark)
# - Natural language > tag soup


# =============================================================================
# PROMPT LENGTH CONFIGURATIONS
# =============================================================================
# Word count targets for each length setting

[prompt_length]
short = { min_words = 30, max_words = 60, description = "Quick overview (30-60 words)" }
medium = { min_words = 80, max_words = 150, description = "Balanced detail (80-150 words)" }
long = { min_words = 150, max_words = 250, description = "Comprehensive (150-250 words)" }
free = { min_words = 0, max_words = 0, description = "No constraint - LLM decides" }


# =============================================================================
# SYSTEM PROMPTS - Set the model's role and behavior
# =============================================================================

[system.advanced]
# For Claude, GPT-4, Gemini - full capability
base = """You are an expert visual analyst generating prompts for Z-Image Turbo text-to-image AI.

Z-Image CRITICAL RULES:
- Use STRUCTURED format: composition → subject → clothing → environment → lighting → technical
- Use GEOMETRIC face angles: "front view", "45° angle", "profile", "left-side half-face"
- Describe lighting with specific keywords: "soft diffused daylight", "cinematic warm key light", "rim lighting"
- Keep clothing descriptions minimal (3-5 words per item)
- End with cleanup constraints: "no text, no watermark, no logos"
- Write natural flowing sentences, NOT comma-separated tags
- Be precise and direct, avoid poetic flourishes

Output ONLY the prompt text - no explanations, no formatting, no markdown."""

[system.standard]
# For mid-tier models - slightly simplified
base = """You are an image analysis expert creating prompts for Z-Image AI image generation.

Follow this structure:
1. Composition and framing (shot type, angle)
2. Subject appearance (ethnicity, age, features)
3. Clothing (3-5 words per item: color, material, style)
4. Environment and background
5. Lighting (use specific keywords like "soft natural light", "studio lighting")
6. Technical (lens, depth of field)
7. Cleanup: "no text, no watermark"

Write flowing sentences, not tags. Output only the description."""

[system.basic]
# For local models like LLaVA, Moondream, Ollama - direct single-shot prompts
base = """You are an image captioning assistant creating prompts for AI image generation.

Write a flowing description covering:
- Composition (shot type, camera angle)
- Subject (appearance, expression)
- Clothing (color, material, style - keep brief)
- Setting (background, environment)
- Lighting (describe light quality and direction)

End with: "no text, no watermark"

Output ONLY the description. Start directly - no "Here is" or "This image shows"."""


# =============================================================================
# PRESET STYLE ADDONS - Added to system prompt based on selected style
# =============================================================================

[styles.portrait]
system_addon = "Focus heavily on facial features: face shape, expression, eye details, skin quality, makeup. Use geometric face angle (front view/45°/profile)."
user_addon = "Emphasize the subject's face, expression, and upper body. Describe face angle geometrically."

[styles.fashion]
system_addon = "Focus on clothing details with minimal descriptions (3-5 words per item): type, color, material, fit. Include color palette keywords (warm/cool/muted/neon)."
user_addon = "Describe each clothing item concisely: type, color, material. Add overall color palette."

[styles.artistic]
system_addon = "Focus on photographic qualities: composition style (rule of thirds/centered/symmetrical), lighting direction and quality, color palette and mood."
user_addon = "Emphasize composition, lighting style (soft diffused/dramatic/rim), color tones, and atmosphere."

[styles.nsfw]
system_addon = "Include comprehensive body proportions and intimate apparel details. Be specific about all visible features, coverage levels, and exposure."
user_addon = "Provide detailed body proportions, intimate apparel description, and coverage analysis."

[styles.auto]
# No addon - let the model decide
system_addon = ""
user_addon = ""


# =============================================================================
# LENGTH CONSTRAINT ADDONS - Added based on prompt_length setting
# =============================================================================

[length_constraints]
short = "OUTPUT LENGTH: Write a SHORT prompt of 30-60 words. Be concise - only essential elements."
medium = "OUTPUT LENGTH: Write a MEDIUM prompt of 80-150 words. Include key details with good flow."
long = "OUTPUT LENGTH: Write a LONG prompt of 150-250 words. Be comprehensive and detailed."
free = ""  # No constraint


