Structure: Shot type → Camera angle → Subject demographics → Hair → Face angle → Expression → Clothing → Pose → Lighting → Background

Use geometric terms for face angles. Use specific lighting keywords.
End with "correct human anatomy, no text, no watermark, no logos".

Output ONLY the final prompt text."""

